<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Dirhami</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo"><span class="logo-icon">&#1583;</span><span class="logo-text">Dirhami</span></a>
            <div class="nav-links">
                <a href="/comparateur.html">Comparateur</a>
                <a href="/simulateurs.html">Simulateurs</a>
                <a href="/blog.html">Blog</a>
            </div>
        </div>
    </nav>

    <main class="page-contact">
        <div class="container">
            <h1>Contactez-nous</h1>
            <p class="section-subtitle">Une question ? Un partenariat ? Ecrivez-nous.</p>

            <div class="contact-layout">
                <form class="contact-form" id="contact-form" onsubmit="sendContact(event)">
                    <div class="form-group">
                        <label>Nom complet</label>
                        <input type="text" id="contact-name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="contact-email" required>
                    </div>
                    <div class="form-group">
                        <label>Sujet</label>
                        <input type="text" id="contact-subject" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea id="contact-message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg">Envoyer</button>
                </form>

                <div class="contact-info">
                    <h3>Informations</h3>
                    <p><strong>Email:</strong> contact@dirhami.ma</p>
                    <p><strong>Adresse:</strong> Casablanca, Maroc</p>
                    <p><strong>Reponse:</strong> sous 24-48h</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Dirhami</p>
        </div>
    </footer>

    <script>
        async function sendContact(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('contact-name').value,
                email: document.getElementById('contact-email').value,
                subject: document.getElementById('contact-subject').value,
                message: document.getElementById('contact-message').value
            };

            try {
                const res = await fetch('/api/contacts/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert('Message envoye avec succes !');
                    document.getElementById('contact-form').reset();
                } else {
                    alert('Erreur lors de l'envoi.');
                }
            } catch (e) {
                alert('Erreur de connexion.');
            }
        }
    </script>
    <script src="/js/app.js"></script>
</body>
</html>
