<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - Dirhami</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo"><span class="logo-icon">&#1583;</span><span class="logo-text">Dirhami</span></a>
            <div class="nav-links">
                <a href="/comparateur.html">Comparateur</a>
                <a href="/simulateurs.html">Simulateurs</a>
                <a href="/blog.html">Blog</a>
            </div>
        </div>
    </nav>

    <main class="page-article">
        <div class="container">
            <article class="article-full" id="article-content">
                <div class="article-loading">Chargement de l'article...</div>
            </article>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Dirhami</p>
        </div>
    </footer>

    <script>
        async function loadArticle() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');

            if (!slug) {
                document.getElementById('article-content').innerHTML = '<p>Article non trouve.</p>';
                return;
            }

            try {
                const res = await fetch(`/api/blog/${slug}`);
                if (!res.ok) throw new Error('Article non trouve');
                const art = await res.json();

                document.getElementById('article-content').innerHTML = `
                    <header class="article-header">
                        <span class="article-category-tag">${art.category}</span>
                        <h1>${art.title}</h1>
                        <div class="article-meta-full">
                            <span>Par ${art.author}</span>
                            <span>${new Date(art.published_at).toLocaleDateString('fr-FR')}</span>
                            <span>${art.views} lectures</span>
                        </div>
                    </header>
                    <div class="article-body">
                        ${art.content.replace(/\n/g, '<br>').replace(/# (.*)/g, '<h2>$1</h2>').replace(/## (.*)/g, '<h3>$1</h3>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}
                    </div>
                    <div class="article-footer">
                        <a href="/blog.html" class="btn btn-outline">&larr; Retour aux articles</a>
                    </div>
                `;
            } catch (e) {
                document.getElementById('article-content').innerHTML = '<p>Erreur de chargement de l'article.</p>';
            }
        }

        loadArticle();
    </script>
    <script src="/js/app.js"></script>
</body>
</html>
