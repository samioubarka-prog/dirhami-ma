<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Admin Dashboard - Dirhami.ma</title>
</head>
<body>
    <nav class="navbar" id="navbar">
        <a href="index.html" class="logo"><i class="fas fa-chart-line"></i> Dirhami<span>.ma</span></a>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html"><i class="fas fa-home"></i> Site</a></li>
            <li><a href="admin.html" class="nav-cta"><i class="fas fa-lock"></i> Admin</a></li>
        </ul>
    </nav>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-tachometer-alt"></i> Tableau de bord</h1>
            <p style="color: var(--gray);">Vue d'ensemble de votre audience et performances</p>
        </div>
        <div class="stats-grid">
            <div class="stat-card blue">
                <h3 id="statLeads">0</h3>
                <p><i class="fas fa-users"></i> Total inscrits</p>
            </div>
            <div class="stat-card orange">
                <h3 id="statLeadsToday">0</h3>
                <p><i class="fas fa-user-plus"></i> Aujourd'hui</p>
            </div>
            <div class="stat-card">
                <h3 id="statSimulations">0</h3>
                <p><i class="fas fa-calculator"></i> Simulations</p>
            </div>
            <div class="stat-card red">
                <h3 id="statArticles">0</h3>
                <p><i class="fas fa-newspaper"></i> Articles</p>
            </div>
        </div>
        <div style="background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); margin-bottom: 2rem;">
            <h3 style="color: var(--primary); margin-bottom: 1.5rem;"><i class="fas fa-envelope"></i> Emails collectés (Leads)</h3>
            <div class="table-container">
                <table id="tableLeads">
                    <thead>
                        <tr><th>Date</th><th>Nom</th><th>Email</th><th>Téléphone</th><th>Intérêt</th><th>Source</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div style="background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.12);">
            <h3 style="color: var(--primary); margin-bottom: 1.5rem;"><i class="fas fa-download"></i> Export des données</h3>
            <button class="btn btn-primary btn-sm" id="btnExportLeads" style="width: auto; margin-right: 1rem;">
                <i class="fas fa-file-csv"></i> Exporter les leads (CSV)
            </button>
            <button class="btn btn-secondary btn-sm" id="btnExportSimulations" style="width: auto;">
                <i class="fas fa-file-csv"></i> Exporter les simulations (CSV)
            </button>
        </div>
    </div>
    <footer class="footer">
        <div class="footer-bottom" style="border-top: none; padding-top: 2rem;">
            <p>© 2026 Dirhami.ma | Admin Dashboard</p>
        </div>
    </footer>
    <div class="toast-container" id="toastContainer"></div>
    <script src="js/main.js"></script>
</body>
</html>
