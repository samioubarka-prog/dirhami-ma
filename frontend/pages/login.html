<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Dirhami</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-coins"></i>
                <h2>Dirhami</h2>
                <p style="color: var(--gray-600); font-size: 0.9rem;">Votre compagnon financier</p>
            </div>

            <div id="loginForm">
                <h3 style="text-align: center; margin-bottom: 24px; color: var(--dark);">Connexion</h3>
                <form class="auth-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="votre@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Mot de passe</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-full">
                        <i class="fas fa-sign-in-alt"></i> Se connecter
                    </button>
                </form>
                <div class="auth-footer">
                    <p>Pas encore de compte ? <a href="#" onclick="showRegister()">S'inscrire</a></p>
                </div>
            </div>

            <div id="registerForm" style="display:none;">
                <h3 style="text-align: center; margin-bottom: 24px; color: var(--dark);">Inscription</h3>
                <form class="auth-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Nom complet</label>
                        <input type="text" id="registerName" placeholder="Votre nom" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" placeholder="votre@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Téléphone</label>
                        <input type="tel" id="registerPhone" placeholder="06 XX XX XX XX">
                    </div>
                    <div class="form-group">
                        <label>Ville</label>
                        <input type="text" id="registerCity" placeholder="Casablanca, Rabat...">
                    </div>
                    <div class="form-group">
                        <label>Mot de passe</label>
                        <input type="password" id="registerPassword" placeholder="Min. 8 caractères" required minlength="8">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-full">
                        <i class="fas fa-user-plus"></i> Créer mon compte
                    </button>
                </form>
                <div class="auth-footer">
                    <p>Déjà un compte ? <a href="#" onclick="showLogin()">Se connecter</a></p>
                </div>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <a href="../index.html" style="color: var(--gray-500); font-size: 0.9rem;">
                    <i class="fas fa-arrow-left"></i> Retour à l'accueil
                </a>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }
        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(API_URL + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token);
                    alert('Connexion réussie !');
                    window.location.href = '../index.html';
                } else {
                    alert('Email ou mot de passe incorrect');
                }
            } catch (error) {
                alert('Erreur de connexion au serveur');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const userData = {
                email: document.getElementById('registerEmail').value,
                password: document.getElementById('registerPassword').value,
                full_name: document.getElementById('registerName').value,
                phone: document.getElementById('registerPhone').value,
                city: document.getElementById('registerCity').value
            };

            try {
                const response = await fetch(API_URL + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (response.ok) {
                    alert('Inscription réussie ! Vous pouvez maintenant vous connecter.');
                    showLogin();
                } else {
                    const error = await response.json();
                    alert(error.detail || 'Erreur lors de l'inscription');
                }
            } catch (error) {
                alert('Erreur de connexion au serveur');
            }
        }
    </script>
</body>
</html>
