<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Budget & Épargne Maroc | Dirhami</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1a5f2a; --secondary: #d4af37; --dark: #1a1a2e; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
        .hero { background: linear-gradient(135deg, var(--dark) 0%, var(--primary) 100%); color: white; padding: 60px 0; }
        .result-box { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 30px; margin-bottom: 20px; }
        .epargne-box { background: linear-gradient(135deg, var(--primary), #2ecc71); color: white; border-radius: 15px; padding: 25px; text-align: center; }
        .categorie-input { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .progress-custom { height: 25px; border-radius: 12px; }
        .conseil-card { background: #e8f5e9; border-radius: 10px; padding: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background: var(--dark);">
    <div class="container">
        <a class="navbar-brand" href="index.html" style="color: var(--secondary); font-weight: bold; font-size: 1.5em;">🇲🇦 DIRHAMI</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="cartes-bancaires.html">Cartes</a>
                <a class="nav-link" href="opcvm.html">OPCVM</a>
                <a class="nav-link" href="credit-immobilier.html">Crédit</a>
                <a class="nav-link" href="retraite.html">Retraite</a>
                <a class="nav-link active" href="budget.html">Budget</a>
                <a class="nav-link" href="fiscalite.html">Fiscalité</a>
                <a class="nav-link" href="blog/index.html">Blog</a>
            </div>
        </div>
    </div>
</nav>

<section class="hero">
    <div class="container text-center">
        <h1>💰 Simulateur Budget & Épargne</h1>
        <p class="lead">Calculez votre budget, identifiez les économies possibles et optimisez votre épargne</p>
    </div>
</section>

<section class="container my-5">
    <div class="row">
        <div class="col-lg-5">
            <div class="card p-4 sticky-top" style="top: 20px;">
                <h4 class="mb-4">📊 Vos revenus et dépenses</h4>

                <div class="mb-3">
                    <label>Revenu net mensuel (DH)</label>
                    <input type="number" id="revenu" class="form-control form-control-lg" value="15000" oninput="calculerBudget()">
                </div>

                <h6 class="mt-4 mb-3">🏠 Logement</h6>
                <div class="categorie-input">
                    <label>Loyer / Crédit immobilier</label>
                    <input type="number" id="loyer" class="form-control" value="4000" oninput="calculerBudget()">
                </div>
                <div class="categorie-input">
                    <label>Charges (eau, électricité, internet)</label>
                    <input type="number" id="charges" class="form-control" value="800" oninput="calculerBudget()">
                </div>

                <h6 class="mt-4 mb-3">🍽️ Alimentation & Vie quotidienne</h6>
                <div class="categorie-input">
                    <label>Courses alimentaires</label>
                    <input type="number" id="courses" class="form-control" value="2500" oninput="calculerBudget()">
                </div>
                <div class="categorie-input">
                    <label>Transport (essence, bus, taxi)</label>
                    <input type="number" id="transport" class="form-control" value="1000" oninput="calculerBudget()">
                </div>

                <h6 class="mt-4 mb-3">💳 Autres dépenses</h6>
                <div class="categorie-input">
                    <label>Téléphone & abonnements</label>
                    <input type="number" id="telephone" class="form-control" value="300" oninput="calculerBudget()">
                </div>
                <div class="categorie-input">
                    <label>Santé & mutuelle</label>
                    <input type="number" id="sante" class="form-control" value="500" oninput="calculerBudget()">
                </div>
                <div class="categorie-input">
                    <label>Loisirs & sorties</label>
                    <input type="number" id="loisirs" class="form-control" value="800" oninput="calculerBudget()">
                </div>
                <div class="categorie-input">
                    <label>Vêtements & shopping</label>
                    <input type="number" id="shopping" class="form-control" value="600" oninput="calculerBudget()">
                </div>
                <div class="categorie-input">
                    <label>Autres dépenses</label>
                    <input type="number" id="autres" class="form-control" value="500" oninput="calculerBudget()">
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div id="resultats-budget"></div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
function calculerBudget() {
    const revenu = parseFloat(document.getElementById('revenu').value) || 0;
    const loyer = parseFloat(document.getElementById('loyer').value) || 0;
    const charges = parseFloat(document.getElementById('charges').value) || 0;
    const courses = parseFloat(document.getElementById('courses').value) || 0;
    const transport = parseFloat(document.getElementById('transport').value) || 0;
    const telephone = parseFloat(document.getElementById('telephone').value) || 0;
    const sante = parseFloat(document.getElementById('sante').value) || 0;
    const loisirs = parseFloat(document.getElementById('loisirs').value) || 0;
    const shopping = parseFloat(document.getElementById('shopping').value) || 0;
    const autres = parseFloat(document.getElementById('autres').value) || 0;

    const totalDepenses = loyer + charges + courses + transport + telephone + sante + loisirs + shopping + autres;
    const epargne = revenu - totalDepenses;
    const tauxEpargne = revenu > 0 ? (epargne / revenu * 100).toFixed(1) : 0;

    // Répartition des dépenses
    const categories = [
        { nom: 'Logement', valeur: loyer + charges, couleur: '#e74c3c' },
        { nom: 'Alimentation', valeur: courses, couleur: '#f39c12' },
        { nom: 'Transport', valeur: transport, couleur: '#3498db' },
        { nom: 'Téléphone', valeur: telephone, couleur: '#9b59b6' },
        { nom: 'Santé', valeur: sante, couleur: '#1abc9c' },
        { nom: 'Loisirs', valeur: loisirs, couleur: '#e67e22' },
        { nom: 'Shopping', valeur: shopping, couleur: '#34495e' },
        { nom: 'Autres', valeur: autres, couleur: '#95a5a6' }
    ];

    // Recommandations
    const recommandations = [];
    const pctLoyer = (loyer / revenu * 100);
    if (pctLoyer > 33) recommandations.push({ type: 'danger', text: `Votre loyer représente ${pctLoyer.toFixed(0)}% de vos revenus (max recommandé: 33%). Envisagez un logement moins cher.` });
    if (tauxEpargne < 10) recommandations.push({ type: 'warning', text: `Votre taux d'épargne est de ${tauxEpargne}%. Objectif minimum: 10%. Essayez de réduire les dépenses de loisirs ou shopping.` });
    if (tauxEpargne >= 20) recommandations.push({ type: 'success', text: `Excellent ! Vous épargnez ${tauxEpargne}% de vos revenus. Pensez à diversifier dans des OPCVM.` });
    if (transport > revenu * 0.15) recommandations.push({ type: 'warning', text: 'Vos frais de transport sont élevés. Envisagez le covoiturage ou les transports en commun.' });
    if (loisirs + shopping > revenu * 0.2) recommandations.push({ type: 'info', text: 'Loisirs + Shopping > 20% du revenu. Il y a peut-être des économies à faire ici.' });

    // Objectifs épargne
    const objectifUrgence = revenu * 3; // 3 mois de salaire
    const objectifRetraite = revenu * 12 * 20; // 20 ans de salaire (simplifié)

    document.getElementById('resultats-budget').innerHTML = `
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="epargne-box">
                    <div class="h6">Capacité d'épargne</div>
                    <div class="h2">${epargne.toLocaleString()} DH</div>
                    <small>/mois (${tauxEpargne}% du revenu)</small>
                </div>
            </div>
            <div class="col-md-6">
                <div class="epargne-box" style="background: ${epargne >= 0 ? 'linear-gradient(135deg, #d4af37, #f39c12)' : 'linear-gradient(135deg, #e74c3c, #c0392b)'};">
                    <div class="h6">${epargne >= 0 ? '✅ Budget équilibré' : '❌ Déficit budgétaire'}</div>
                    <div class="h2">${epargne >= 0 ? '+' : ''}${epargne.toLocaleString()} DH</div>
                    <small>${epargne >= 0 ? 'Vous pouvez épargner' : 'Vous dépensez plus que vous ne gagnez'}</small>
                </div>
            </div>
        </div>

        <div class="result-box mb-4">
            <h5>📊 Répartition de votre budget</h5>
            <div class="row">
                <div class="col-md-6">
                    <canvas id="budgetChart" height="250"></canvas>
                </div>
                <div class="col-md-6">
                    <h6>Détail des dépenses</h6>
                    ${categories.map(c => `
                        <div class="mb-2">
                            <div class="d-flex justify-content-between">
                                <span>${c.nom}</span>
                                <span><strong>${c.valeur.toLocaleString()} DH</strong> (${(c.valeur/revenu*100).toFixed(1)}%)</span>
                            </div>
                            <div class="progress progress-custom">
                                <div class="progress-bar" style="width: ${(c.valeur/revenu*100)}%; background: ${c.couleur}"></div>
                            </div>
                        </div>
                    `).join('')}
                    <div class="mt-3 pt-3 border-top">
                        <div class="d-flex justify-content-between">
                            <span><strong>Total dépenses</strong></span>
                            <span><strong>${totalDepenses.toLocaleString()} DH</strong></span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span><strong>Épargne</strong></span>
                            <span class="${epargne >= 0 ? 'text-success' : 'text-danger'}"><strong>${epargne.toLocaleString()} DH</strong></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="result-box mb-4">
            <h5>🎯 Objectifs d'épargne</h5>
            <div class="row">
                <div class="col-md-6">
                    <div class="card bg-light p-3">
                        <h6>Fond d'urgence (3 mois)</h6>
                        <div class="h4">${objectifUrgence.toLocaleString()} DH</div>
                        <small>À constituer en priorité sur un compte épargne</small>
                        <div class="progress mt-2">
                            <div class="progress-bar bg-success" style="width: ${Math.min((epargne * 12 / objectifUrgence * 100), 100)}%"></div>
                        </div>
                        <small>${epargne > 0 ? `Avec ${epargne.toLocaleString()} DH/mois: ${Math.ceil(objectifUrgence/epargne)} mois pour l'atteindre` : 'Commencez à épargner dès maintenant'}</small>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card bg-light p-3">
                        <h6>Projection épargne (1 an)</h6>
                        <div class="h4">${(epargne * 12).toLocaleString()} DH</div>
                        <small>Sans intérêts, avec versement régulier</small>
                        <div class="progress mt-2">
                            <div class="progress-bar bg-primary" style="width: 100%"></div>
                        </div>
                        <small>Avec 5%/an en OPCVM: ${(epargne * 12 * 1.05).toLocaleString()} DH</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="result-box">
            <h5>💡 Recommandations personnalisées</h5>
            ${recommandations.length > 0 ? recommandations.map(r => `
                <div class="conseil-card ${r.type === 'danger' ? 'bg-danger text-white' : r.type === 'warning' ? 'bg-warning' : r.type === 'success' ? 'bg-success text-white' : 'bg-info'}">
                    ${r.text}
                </div>
            `).join('') : '<div class="conseil-card">Votre budget semble bien équilibré. Continuez ainsi !</div>'}

            <div class="conseil-card mt-3">
                <strong>📈 Comment augmenter votre épargne:</strong>
                <ul class="mb-0 mt-2">
                    <li>Automatisez vos virements épargne dès la réception du salaire</li>
                    <li>Utilisez la règle 50/30/20: 50% besoins, 30% envies, 20% épargne</li>
                    <li>Comparez vos assurances et abonnements chaque année</li>
                    <li>Placez votre fond d'urgence sur un compte rémunéré (Wafa Trésorerie: 3.2%/an)</li>
                </ul>
            </div>
        </div>
    `;

    // Graphique camembert
    setTimeout(() => {
        const ctx = document.getElementById('budgetChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: [...categories.map(c => c.nom), 'Épargne'],
                datasets: [{
                    data: [...categories.map(c => c.valeur), Math.max(epargne, 0)],
                    backgroundColor: [...categories.map(c => c.couleur), '#1a5f2a']
                }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });
    }, 100);
}

calculerBudget();
</script>
</body>
</html>
