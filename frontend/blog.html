<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Finance Maroc 2026 - Dirhami.ma</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 30px; }
        .blog-card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #eee; transition: transform 0.3s, box-shadow 0.3s; }
        .blog-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .blog-image { height: 180px; background: #2c3e50; display: flex; align-items: center; justify-content: center; color: white; font-size: 48px; }
        .blog-content { padding: 20px; }
        .blog-category { display: inline-block; background: #3498db; color: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; }
        .blog-title { font-size: 18px; font-weight: 600; color: #2c3e50; margin: 0 0 10px 0; line-height: 1.4; }
        .blog-excerpt { color: #7f8c8d; font-size: 14px; line-height: 1.6; margin-bottom: 15px; }
        .blog-meta { display: flex; justify-content: space-between; align-items: center; color: #95a5a6; font-size: 12px; }
        .blog-link { color: #3498db; text-decoration: none; font-weight: 600; }
        .blog-link:hover { text-decoration: underline; }
        .filters { margin-bottom: 30px; }
        .filter-btn { background: #f8f9fa; border: 1px solid #ddd; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-right: 10px; margin-bottom: 10px; }
        .filter-btn.active { background: #3498db; color: white; border-color: #3498db; }
        #loading { text-align: center; padding: 40px; }
        #error { color: red; padding: 20px; background: #fee; border-radius: 8px; display: none; }
        @media (max-width: 768px) { .blog-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Dirhami.ma</a>
            <ul class="nav-links">
                <li><a href="comparateur-cartes.html">Cartes Bancaires</a></li>
                <li><a href="comparateur-opcvm.html">OPCVM</a></li>
                <li><a href="simulateur-credit.html">Crédit</a></li>
                <li><a href="simulateur-retraite.html">Retraite</a></li>
                <li><a href="simulateur-budget.html">Budget</a></li>
                <li><a href="regimes-fiscaux.html">Régimes Fiscaux</a></li>
                <li><a href="blog.html">Blog</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="padding-top: 100px;">
        <h1>Blog Finance Maroc 2026</h1>
        <p>Conseils, guides et actualités sur la finance personnelle au Maroc</p>

        <div class="filters">
            <button class="filter-btn active" onclick="filterArticles('')">Tous</button>
            <button class="filter-btn" onclick="filterArticles('Immobilier')">Immobilier</button>
            <button class="filter-btn" onclick="filterArticles('Épargne')">Épargne</button>
            <button class="filter-btn" onclick="filterArticles('Investissement')">Investissement</button>
            <button class="filter-btn" onclick="filterArticles('Banques')">Banques</button>
            <button class="filter-btn" onclick="filterArticles('Crédit')">Crédit</button>
            <button class="filter-btn" onclick="filterArticles('Retraite')">Retraite</button>
            <button class="filter-btn" onclick="filterArticles('Fiscalité')">Fiscalité</button>
            <button class="filter-btn" onclick="filterArticles('Patrimoine')">Patrimoine</button>
            <button class="filter-btn" onclick="filterArticles('Budget')">Budget</button>
        </div>

        <div id="loading">Chargement des articles...</div>
        <div id="error"></div>
        <div class="blog-grid" id="blog-grid"></div>
    </div>

    <script>
        let allArticles = [];
        const API_URL = window.location.origin.includes('localhost') ? 'http://localhost:5000' : '';

        async function loadArticles() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').style.display = 'none';
                const response = await fetch(`${API_URL}/api/articles`);
                if (!response.ok) throw new Error('Erreur réseau');
                allArticles = await response.json();
                displayArticles(allArticles);
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Erreur de chargement : ' + err.message;
            }
        }

        function displayArticles(articles) {
            const grid = document.getElementById('blog-grid');
            grid.innerHTML = '';
            articles.forEach(article => {
                const card = document.createElement('div');
                card.className = 'blog-card';
                card.innerHTML = `
                    <div class="blog-image">📰</div>
                    <div class="blog-content">
                        <span class="blog-category">${article.categorie}</span>
                        <h3 class="blog-title">${article.titre}</h3>
                        <p class="blog-excerpt">${article.contenu.substring(0, 120)}...</p>
                        <div class="blog-meta">
                            <span>${new Date(article.date_pub).toLocaleDateString('fr-FR')}</span>
                            <a href="article.html?slug=${article.slug}" class="blog-link">Lire l'article →</a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterArticles(categorie) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if (categorie === '') {
                displayArticles(allArticles);
            } else {
                displayArticles(allArticles.filter(a => a.categorie === categorie));
            }
        }

        loadArticles();
    </script>
</body>
</html>
