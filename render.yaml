services:
  - type: web
    name: dirhami-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dirhami-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11
    healthCheckPath: /health

  - type: web
    name: dirhami-frontend
    runtime: static
    plan: free
    staticPublishPath: ./frontend
    buildCommand: echo "Static site - no build needed"
    envVars:
      - key: API_URL
        value: https://dirhami-backend.onrender.com/api/v1

databases:
  - name: dirhami-db
    plan: free
    databaseName: dirhami_db
    user: dirhami_user
