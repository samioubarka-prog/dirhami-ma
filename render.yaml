services:
  - type: web
    name: dirhami-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: dirhami-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: FRONTEND_URL
        value: https://dirhami-ma.onrender.com
      - key: DEBUG
        value: False

databases:
  - name: dirhami-db
    plan: free
    databaseName: dirhami_db
    user: dirhami_user
