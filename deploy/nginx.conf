server {
    listen 80;
    server_name dirhami.ma www.dirhami.ma;

    location / {
        root /var/www/dirhami/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
