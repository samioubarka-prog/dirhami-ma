version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dirhami_user
      POSTGRES_PASSWORD: dirhami_pass
      POSTGRES_DB: dirhami_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ../backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://dirhami_user:dirhami_pass@db:5432/dirhami_db
      SECRET_KEY: change-me-in-production
    depends_on:
      - db

  frontend:
    image: nginx:alpine
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
